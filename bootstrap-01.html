<!doctype html>
<html lang="en">
  <head>
    <title>Item Display</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5" style="max-width: 450px;">
      <h2 class="mb-3">Item Display</h2>
      
      <div class="mb-3">
        <select name="item-list" id="item-list" class="form-select border-dark">
          <option value="">-- Select an item --</option>
        </select>
      </div>
      
      <hr class="mb-3" />
      
      <div class="row mb-2">
        <div class="col-5 fw-bold">ID</div>
        <div class="col-7" id="item-id"></div>
      </div>
      <div class="row mb-2">
        <div class="col-5 fw-bold">Name</div>
        <div class="col-7" id="item-name"></div>
      </div>
      <div class="row mb-2">
        <div class="col-5 fw-bold">Category</div>
        <div class="col-7" id="item-category"></div>
      </div>
      <div class="row mb-2">
        <div class="col-5 fw-bold">Inventory Amt.</div>
        <div class="col-7" id="item-inventory"></div>
      </div>
      <div class="row mb-2">
        <div class="col-5 fw-bold">List price</div>
        <div class="col-7" id="item-price"></div>
      </div>
    </div>

    <script src="item-lisr.js"></script>
    <script src="script.js"></script>
  </body>
</html>
